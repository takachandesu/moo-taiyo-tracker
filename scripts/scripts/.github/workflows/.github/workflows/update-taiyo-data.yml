name: Taiyo Widget Data

on:
  schedule:
    - cron: "*/30 0-9 * * 1-5"   # UTC 0:00–9:00 平日 ≒ JST 9:00–18:00 平日
  workflow_dispatch: {}

concurrency:
  group: taiyo-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Build & upload taiyo-data.json
        env:
          EDINET_API_KEY:       ${{ secrets.EDINET_API_KEY }}
          LOLIPOP_FTP_HOST:     ${{ secrets.LOLIPOP_FTP_HOST }}
          LOLIPOP_FTP_USER:     ${{ secrets.LOLIPOP_FTP_USER }}
          LOLIPOP_FTP_PASSWORD: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
        run: python scripts/build_widget_data.py
