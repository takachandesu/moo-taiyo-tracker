name: Taiyo Hoyu Tweet

on:
  schedule:
    # GitHub cron は UTC。UTC 0:00–9:00 平日 ≒ JST 9:00–18:00 平日(提出受付 9:00–17:15 をカバー)
    - cron: "*/30 0-9 * * 1-5"
  workflow_dispatch: {}   # 手動実行(Actions タブの Run workflow)

permissions:
  contents: write          # tweeted.json をコミットバックするため

concurrency:
  group: taiyo-tweet       # 多重起動を防止
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Post new large-holding reports
        env:
          EDINET_API_KEY:        ${{ secrets.EDINET_API_KEY }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:       ${{ secrets.X_ACCESS_SECRET }}
          LOLIPOP_FTP_HOST:      ${{ secrets.LOLIPOP_FTP_HOST }}
          LOLIPOP_FTP_USER:      ${{ secrets.LOLIPOP_FTP_USER }}
          LOLIPOP_FTP_PASSWORD:  ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          LOLIPOP_FTP_PATH:      ${{ secrets.LOLIPOP_FTP_PATH }}
        run: python scripts/post_taiyo.py

      - name: Commit tweeted.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/tweeted.json; then
            git add data/tweeted.json
            git commit -m "update tweeted docIDs [skip ci]"
            git push
          else
            echo "no change"
          fi
