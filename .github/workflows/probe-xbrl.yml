name: Probe XBRL

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Dump one report structure
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python scripts/probe_xbrl.py
